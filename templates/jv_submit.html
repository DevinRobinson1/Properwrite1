{% extends "base.html" %}
{% block title %}Submit a JV Deal{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/jv_submit.css') }}">
<section id="jv-wizard" class="mx-auto max-w-3xl p-4">
  <!-- Step progress bar -->
  <ol id="wizard-steps" class="flex justify-between text-sm mb-6">
    <li data-step="1" class="step active">Partner Info</li>
    <li data-step="2" class="step">Property Details</li>
    <li data-step="3" class="step">Deal Numbers</li>
    <li data-step="4" class="step">Review & Submit</li>
  </ol>

  <!-- STEP 1 – Partner Info -->
  <form id="jv-form" autocomplete="off">
    <fieldset data-step="1">
      <h2 class="text-lg font-semibold mb-4">Partner Information</h2>
      <label>Email*
        <input type="email" name="email" required>
      </label>
      <label>Phone*
        <input type="tel" name="phone" required>
      </label>
      <button type="button" class="btn next">Continue</button>
    </fieldset>

    <!-- STEP 2 – Property -->
    <fieldset data-step="2" hidden>
      <h2 class="text-lg font-semibold mb-4">Property Address</h2>
      <label>Address* 
        <input id="autocomplete" type="text" name="address" placeholder="Start typing…" required>
      </label>
      <label>Deal Type*
        <select name="deal_type" required>
          <option value="Cash">Cash / Dispo Help</option>
          <option value="Creative">Creative Finance</option>
        </select>
      </label>
      <button type="button" class="btn prev">Back</button>
      <button type="button" class="btn next">Continue</button>
    </fieldset>

    <!-- STEP 3 – Deal Numbers -->
    <fieldset data-step="3" hidden>
      <h2 class="text-lg font-semibold mb-4">Deal Numbers</h2>
      <label>Asking Price*
        <input type="number" name="asking_price" required>
      </label>
      <label>ARV*
        <input type="number" name="arv" required>
      </label>
      <label>Estimated Rehab $
        <input type="number" name="rehab_cost">
      </label>
      <label>Photo Link
        <input type="url" name="photo_link">
      </label>
      <button type="button" class="btn prev">Back</button>
      <button type="button" class="btn next">Continue</button>
    </fieldset>

    <!-- STEP 4 – Review -->
    <fieldset data-step="4" hidden>
      <h2 class="text-lg font-semibold mb-4">Review Deal</h2>
      <div id="review-container" class="mb-4"></div>
      <button type="button" class="btn prev">Back</button>
      <button type="submit" class="btn primary w-full">Submit JV Deal</button>
    </fieldset>
  </form>
</section>

<script src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_KEY }}&libraries=places"></script>
<script src="{{ url_for('static', filename='js/jv_submit.js') }}"></script>
{% endblock %}
