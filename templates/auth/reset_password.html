<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-WXR2WK4Q');</script>
    <!-- End Google Tag Manager -->
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - properwrite.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .form-shadow {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="min-h-screen gradient-bg flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WXR2WK4Q"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    
    <!-- Logo and Header -->
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full shadow-lg">
                <span class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">P</span>
            </div>
        </div>
        <h2 class="mt-6 text-center text-3xl font-extrabold text-white">
            Set New Password
        </h2>
        <p class="mt-2 text-center text-sm text-purple-100">
            Enter your new password below
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 form-shadow rounded-lg sm:px-10">
            <!-- Success Message (initially hidden) -->
            <div id="success-message" class="hidden mb-6 bg-green-50 border border-green-200 rounded-lg p-4">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i class="fas fa-check-circle text-green-400"></i>
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-green-800">Password Reset Successful!</h3>
                        <div class="mt-2 text-sm text-green-700">
                            <p>Your password has been updated successfully. You can now <a href="/login" class="font-medium underline">login with your new password</a>.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Error Message (initially hidden) -->
            <div id="error-message" class="hidden mb-6 bg-red-50 border border-red-200 rounded-lg p-4">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i class="fas fa-exclamation-circle text-red-400"></i>
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-red-800">Reset Failed</h3>
                        <div class="mt-2 text-sm text-red-700">
                            <p id="error-text"></p>
                        </div>
                    </div>
                </div>
            </div>

            <form id="reset-form" method="POST">
                <input type="hidden" name="token" value="{{ token }}" id="reset-token">
                <input type="hidden" name="email" value="{{ email }}" id="reset-email">
                
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock text-gray-400 mr-2"></i>
                        New Password
                    </label>
                    <div class="relative">
                        <input id="password" name="password" type="password" required
                               class="appearance-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm transition duration-150 ease-in-out"
                               placeholder="Enter your new password"
                               minlength="8">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <i id="toggle-password" class="fas fa-eye text-gray-400 cursor-pointer hover:text-gray-600" onclick="togglePassword('password', 'toggle-password')"></i>
                        </div>
                    </div>
                    <p class="mt-2 text-xs text-gray-600">Must be at least 8 characters long</p>
                </div>

                <div class="mb-6">
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock text-gray-400 mr-2"></i>
                        Confirm New Password
                    </label>
                    <div class="relative">
                        <input id="confirm-password" name="confirm_password" type="password" required
                               class="appearance-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm transition duration-150 ease-in-out"
                               placeholder="Confirm your new password"
                               minlength="8">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <i id="toggle-confirm-password" class="fas fa-eye text-gray-400 cursor-pointer hover:text-gray-600" onclick="togglePassword('confirm-password', 'toggle-confirm-password')"></i>
                        </div>
                    </div>
                </div>

                <div>
                    <button type="submit" id="submit-button"
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transform transition duration-150 ease-in-out hover:scale-[1.02] active:scale-[0.98] shadow-lg">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                            <i class="fas fa-key text-purple-300 group-hover:text-purple-200"></i>
                        </span>
                        Update Password
                    </button>
                </div>
            </form>

            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Need help?</span>
                    </div>
                </div>

                <div class="mt-6 text-center">
                    <a href="/login" class="font-medium text-purple-600 hover:text-purple-500 transition duration-150 ease-in-out">
                        <i class="fas fa-arrow-left mr-2"></i>
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, toggleId) {
            const passwordInput = document.getElementById(inputId);
            const toggleIcon = document.getElementById(toggleId);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const submitButton = document.getElementById('submit-button');
            const successMessage = document.getElementById('success-message');
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            // Basic validation
            if (password.length < 8) {
                errorText.textContent = 'Password must be at least 8 characters long.';
                errorMessage.classList.remove('hidden');
                successMessage.classList.add('hidden');
                return;
            }
            
            if (password !== confirmPassword) {
                errorText.textContent = 'Passwords do not match.';
                errorMessage.classList.remove('hidden');
                successMessage.classList.add('hidden');
                return;
            }
            
            // Disable button and show loading state
            submitButton.disabled = true;
            submitButton.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Updating...';
            
            // Hide any previous messages
            successMessage.classList.add('hidden');
            errorMessage.classList.add('hidden');
            
            try {
                const formData = new FormData(this);
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Show success message
                    successMessage.classList.remove('hidden');
                    // Clear the form
                    this.reset();
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    // Show error message
                    errorText.textContent = data.error || 'An error occurred. Please try again.';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                errorText.textContent = 'Network error. Please check your connection and try again.';
                errorMessage.classList.remove('hidden');
            } finally {
                // Re-enable button
                submitButton.disabled = false;
                submitButton.innerHTML = '<span class="absolute left-0 inset-y-0 flex items-center pl-3"><i class="fas fa-key text-purple-300 group-hover:text-purple-200"></i></span>Update Password';
            }
        });
    </script>
</body>
</html>
