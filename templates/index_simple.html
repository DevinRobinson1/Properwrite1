<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Investment Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f3f4f6; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; text-align: center; }
        .card { background: white; border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 8px; color: #374151; }
        .form-group input { padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: #3b82f6; }
        .btn { background: #3b82f6; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        .btn:hover { background: #2563eb; transform: translateY(-1px); }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .loading { display: none; text-align: center; color: #6b7280; margin: 20px 0; }
        .loading.show { display: block; }
        .spinner { border: 3px solid #f3f4f6; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { background: #fee2e2; color: #dc2626; padding: 15px; border-radius: 8px; margin: 15px 0; display: none; }
        .error.show { display: block; }
        .success { background: #d1fae5; color: #059669; padding: 15px; border-radius: 8px; margin: 15px 0; display: none; }
        .success.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Real Estate Investment Analyzer</h1>
            <p>Smart Property Analysis & Investment Strategy Calculator</p>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #374151;">Property Analysis</h2>
            
            <form id="property-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="address">Street Address *</label>
                        <input type="text" id="address" name="address" required placeholder="14303 Evening Flight Lane">
                    </div>
                    <div class="form-group">
                        <label for="city">City *</label>
                        <input type="text" id="city" name="city" required placeholder="Charlotte">
                    </div>
                    <div class="form-group">
                        <label for="state">State *</label>
                        <input type="text" id="state" name="state" required placeholder="North Carolina">
                    </div>
                    <div class="form-group">
                        <label for="zip">ZIP Code *</label>
                        <input type="text" id="zip" name="zip" required placeholder="28262">
                    </div>
                </div>
                
                <div style="text-align: center;">
                    <button type="submit" class="btn">Analyze Property</button>
                </div>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Pulling property data from external sources...</p>
            </div>

            <div class="error" id="error-message"></div>
            <div class="success" id="success-message"></div>
        </div>

        <div id="results-container" style="display: none;">
            <!-- Results will be loaded here -->
        </div>
    </div>

    <script>
        document.getElementById('property-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // Show loading
            document.getElementById('loading').classList.add('show');
            document.querySelector('.btn').disabled = true;
            document.getElementById('error-message').classList.remove('show');
            document.getElementById('success-message').classList.remove('show');
            
            try {
                const response = await fetch('/api/analyze-property', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('success-message').textContent = 'Property analyzed successfully!';
                    document.getElementById('success-message').classList.add('show');
                    
                    // Store property data globally and display results
                    window.currentPropertyData = result;
                    displayResults(result);
                } else {
                    throw new Error(result.error || 'Analysis failed');
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('error-message').textContent = 'Error: ' + error.message;
                document.getElementById('error-message').classList.add('show');
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.querySelector('.btn').disabled = false;
            }
        });

        function displayResults(data) {
            const resultsContainer = document.getElementById('results-container');
            
            resultsContainer.innerHTML = `
                <div class="card">
                    <h2 style="margin-bottom: 20px; color: #374151;">Property Analysis Results</h2>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px;">
                        <div style="background: #f8fafc; padding: 20px; border-radius: 8px; border: 2px solid #e2e8f0;">
                            <h3 style="color: #1e40af; margin-bottom: 15px;">Property Information</h3>
                            <p><strong>Address:</strong> ${data.address || 'N/A'}</p>
                            <p><strong>City:</strong> ${data.city || 'N/A'}</p>
                            <p><strong>State:</strong> ${data.state || 'N/A'}</p>
                            <p><strong>ZIP:</strong> ${data.zip || 'N/A'}</p>
                            <p><strong>Property Type:</strong> ${data.property_type || 'N/A'}</p>
                            <p><strong>Year Built:</strong> ${data.year_built || 'N/A'}</p>
                            <p><strong>Bedrooms:</strong> ${data.bedrooms || 'N/A'}</p>
                            <p><strong>Bathrooms:</strong> ${data.bathrooms || 'N/A'}</p>
                            <p><strong>Square Feet:</strong> ${data.square_feet ? data.square_feet.toLocaleString() : 'N/A'}</p>
                        </div>
                        
                        <div style="background: #f0fdf4; padding: 20px; border-radius: 8px; border: 2px solid #bbf7d0;">
                            <h3 style="color: #166534; margin-bottom: 15px;">Property Values</h3>
                            <p><strong>Current Value:</strong> $${data.estimated_value ? data.estimated_value.toLocaleString() : 'N/A'}</p>
                            <p><strong>Monthly Rent Estimate:</strong> $${data.rent_estimate ? data.rent_estimate.toLocaleString() : 'N/A'}</p>
                            <p><strong>Data Source:</strong> ${data.data_source || 'N/A'}</p>
                            <p><strong>Data Quality:</strong> ${data.data_quality || 'N/A'}</p>
                            <p><strong>Comparable Sales:</strong> ${data.comps_count || 0} found</p>
                        </div>
                    </div>
                    
                    <div style="background: #fef3c7; padding: 20px; border-radius: 8px; border: 2px solid #fcd34d; margin-bottom: 20px;">
                        <h3 style="color: #92400e; margin-bottom: 15px;">Market Analysis</h3>
                        <p><strong>Average Price per Sq Ft:</strong> $${data.market_analysis?.avg_price_per_sqft || 'N/A'}</p>
                        <p><strong>Sales Count:</strong> ${data.market_analysis?.sales_count || 0}</p>
                        <p><strong>Price Range:</strong> $${data.market_analysis?.price_range?.min?.toLocaleString() || 'N/A'} - $${data.market_analysis?.price_range?.max?.toLocaleString() || 'N/A'}</p>
                        <p><strong>Last Updated:</strong> ${data.last_updated ? new Date(data.last_updated).toLocaleString() : 'N/A'}</p>
                    </div>
                    
                    <div style="text-align: center;">
                        <button class="btn" onclick="showCalculators()" style="background: #059669;">
                            Show Investment Calculators
                        </button>
                    </div>
                </div>
            `;
            
            resultsContainer.style.display = 'block';
        }

        function showCalculators() {
            const calculatorsContainer = document.createElement('div');
            calculatorsContainer.innerHTML = `
                <div class="card">
                    <h2 style="margin-bottom: 20px; color: #374151;">Investment Strategy Calculators</h2>
                    
                    <!-- Calculator Tabs -->
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb;">
                        <button class="calc-tab active" onclick="showCalculatorTab('wholesale')" style="padding: 10px 20px; border: none; background: #3b82f6; color: white; border-radius: 8px 8px 0 0; cursor: pointer;">
                            Wholesale
                        </button>
                        <button class="calc-tab" onclick="showCalculatorTab('installment')" style="padding: 10px 20px; border: none; background: #e5e7eb; color: #374151; border-radius: 8px 8px 0 0; cursor: pointer;">
                            Installment
                        </button>
                        <button class="calc-tab" onclick="showCalculatorTab('subject-to')" style="padding: 10px 20px; border: none; background: #e5e7eb; color: #374151; border-radius: 8px 8px 0 0; cursor: pointer;">
                            Subject-To
                        </button>
                        <button class="calc-tab" onclick="showCalculatorTab('seller-finance')" style="padding: 10px 20px; border: none; background: #e5e7eb; color: #374151; border-radius: 8px 8px 0 0; cursor: pointer;">
                            Seller Finance
                        </button>
                    </div>
                    
                    <!-- Wholesale Calculator -->
                    <div id="wholesale-calc" class="calc-content">
                        <h3 style="color: #059669; margin-bottom: 15px;">Wholesale Calculator</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px;">
                            <div class="form-group">
                                <label>ARV (After Repair Value)</label>
                                <input type="number" id="wholesale-arv" placeholder="415000" onchange="calculateWholesale()">
                            </div>
                            <div class="form-group">
                                <label>Estimated Repairs</label>
                                <input type="number" id="wholesale-repairs" placeholder="25000" onchange="calculateWholesale()">
                            </div>
                            <div class="form-group">
                                <label>Assignment Fee</label>
                                <input type="number" id="wholesale-fee" placeholder="15000" onchange="calculateWholesale()">
                            </div>
                        </div>
                        <div style="background: #f0fdf4; padding: 20px; border-radius: 8px; border: 2px solid #bbf7d0;">
                            <h4 style="color: #166534;">Maximum Allowable Offer (MAO)</h4>
                            <div style="font-size: 24px; font-weight: bold; color: #059669;" id="wholesale-mao">$0</div>
                        </div>
                    </div>
                    
                    <!-- Installment Calculator -->
                    <div id="installment-calc" class="calc-content" style="display: none;">
                        <h3 style="color: #2563eb; margin-bottom: 15px;">Installment Calculator</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px;">
                            <div class="form-group">
                                <label>Final Sales Price</label>
                                <input type="number" id="installment-price" placeholder="415000" onchange="calculateInstallment()">
                            </div>
                            <div class="form-group">
                                <label>Total Fees</label>
                                <input type="number" id="installment-fees" placeholder="35000" onchange="calculateInstallment()">
                            </div>
                            <div class="form-group">
                                <label>Minimum Profit</label>
                                <input type="number" id="installment-profit" placeholder="15000" onchange="calculateInstallment()">
                            </div>
                        </div>
                        <div style="background: #eff6ff; padding: 20px; border-radius: 8px; border: 2px solid #93c5fd;">
                            <h4 style="color: #1d4ed8;">Maximum Allowable Offer</h4>
                            <div style="font-size: 24px; font-weight: bold; color: #2563eb;" id="installment-mao">$0</div>
                        </div>
                    </div>
                    
                    <!-- Subject-To Calculator -->
                    <div id="subject-to-calc" class="calc-content" style="display: none;">
                        <h3 style="color: #dc2626; margin-bottom: 15px;">Subject-To Calculator</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px;">
                            <div class="form-group">
                                <label>Existing Loan Balance</label>
                                <input type="number" id="subto-balance" placeholder="350000" onchange="calculateSubjectTo()">
                            </div>
                            <div class="form-group">
                                <label>Monthly Rent</label>
                                <input type="number" id="subto-rent" placeholder="1325" onchange="calculateSubjectTo()">
                            </div>
                            <div class="form-group">
                                <label>Monthly PITI</label>
                                <input type="number" id="subto-piti" placeholder="2100" onchange="calculateSubjectTo()">
                            </div>
                        </div>
                        <div style="background: #fef2f2; padding: 20px; border-radius: 8px; border: 2px solid #fca5a5;">
                            <h4 style="color: #991b1b;">Monthly Cash Flow</h4>
                            <div style="font-size: 24px; font-weight: bold; color: #dc2626;" id="subto-cashflow">$0</div>
                        </div>
                    </div>
                    
                    <!-- Seller Finance Calculator -->
                    <div id="seller-finance-calc" class="calc-content" style="display: none;">
                        <h3 style="color: #7c3aed; margin-bottom: 15px;">Seller Finance Calculator</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px;">
                            <div class="form-group">
                                <label>Purchase Price</label>
                                <input type="number" id="sf-price" placeholder="400000" onchange="calculateSellerFinance()">
                            </div>
                            <div class="form-group">
                                <label>Down Payment</label>
                                <input type="number" id="sf-down" placeholder="40000" onchange="calculateSellerFinance()">
                            </div>
                            <div class="form-group">
                                <label>Interest Rate (%)</label>
                                <input type="number" id="sf-rate" placeholder="6" step="0.1" onchange="calculateSellerFinance()">
                            </div>
                            <div class="form-group">
                                <label>Term (Years)</label>
                                <input type="number" id="sf-term" placeholder="30" onchange="calculateSellerFinance()">
                            </div>
                        </div>
                        <div style="background: #faf5ff; padding: 20px; border-radius: 8px; border: 2px solid #c4b5fd;">
                            <h4 style="color: #6b21a8;">Monthly Payment</h4>
                            <div style="font-size: 24px; font-weight: bold; color: #7c3aed;" id="sf-payment">$0</div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('results-container').appendChild(calculatorsContainer);
            
            // Pre-fill with property data
            const propertyData = window.currentPropertyData || {};
            if (propertyData.estimated_value) {
                document.getElementById('wholesale-arv').value = propertyData.estimated_value;
                document.getElementById('installment-price').value = propertyData.estimated_value;
                document.getElementById('sf-price').value = propertyData.estimated_value;
                calculateWholesale();
                calculateInstallment();
                calculateSellerFinance();
            }
            if (propertyData.rent_estimate) {
                document.getElementById('subto-rent').value = propertyData.rent_estimate;
                calculateSubjectTo();
            }
        }

        // Calculator functions
        function showCalculatorTab(tabName) {
            // Hide all calculator contents
            const contents = document.querySelectorAll('.calc-content');
            contents.forEach(content => content.style.display = 'none');
            
            // Remove active class from all tabs
            const tabs = document.querySelectorAll('.calc-tab');
            tabs.forEach(tab => {
                tab.style.background = '#e5e7eb';
                tab.style.color = '#374151';
            });
            
            // Show selected content and activate tab
            document.getElementById(tabName + '-calc').style.display = 'block';
            event.target.style.background = '#3b82f6';
            event.target.style.color = 'white';
        }

        function calculateWholesale() {
            const arv = parseFloat(document.getElementById('wholesale-arv').value) || 0;
            const repairs = parseFloat(document.getElementById('wholesale-repairs').value) || 0;
            const fee = parseFloat(document.getElementById('wholesale-fee').value) || 0;
            
            const mao = (arv * 0.7) - repairs - fee;
            document.getElementById('wholesale-mao').textContent = '$' + Math.max(0, mao).toLocaleString();
        }

        function calculateInstallment() {
            const price = parseFloat(document.getElementById('installment-price').value) || 0;
            const fees = parseFloat(document.getElementById('installment-fees').value) || 0;
            const profit = parseFloat(document.getElementById('installment-profit').value) || 0;
            
            const mao = price - fees - profit;
            document.getElementById('installment-mao').textContent = '$' + Math.max(0, mao).toLocaleString();
        }

        function calculateSubjectTo() {
            const rent = parseFloat(document.getElementById('subto-rent').value) || 0;
            const piti = parseFloat(document.getElementById('subto-piti').value) || 0;
            
            const cashflow = rent - piti;
            document.getElementById('subto-cashflow').textContent = '$' + cashflow.toLocaleString();
        }

        function calculateSellerFinance() {
            const price = parseFloat(document.getElementById('sf-price').value) || 0;
            const down = parseFloat(document.getElementById('sf-down').value) || 0;
            const rate = parseFloat(document.getElementById('sf-rate').value) || 0;
            const term = parseFloat(document.getElementById('sf-term').value) || 0;
            
            if (price && rate && term) {
                const principal = price - down;
                const monthlyRate = rate / 100 / 12;
                const numPayments = term * 12;
                
                const payment = principal * (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / (Math.pow(1 + monthlyRate, numPayments) - 1);
                document.getElementById('sf-payment').textContent = '$' + payment.toLocaleString();
            } else {
                document.getElementById('sf-payment').textContent = '$0';
            }
        }

        // Update displayResults to store data globally
        window.currentPropertyData = {};

        // Test server connection on load
        fetch('/test')
            .then(response => response.text())
            .then(data => console.log('Server connection test successful'))
            .catch(error => {
                console.error('Server connection test failed:', error);
                document.getElementById('error-message').textContent = 'Server connection failed. Please refresh the page.';
                document.getElementById('error-message').classList.add('show');
            });
    </script>
</body>
</html>
